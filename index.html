<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Island iPhone 11 (Precision Update)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Menggunakan rasio presisi berdasarkan ukuran layar 6.5 x 14.0731 cm */
        .iphone-screen {
            aspect-ratio: 6.5 / 14.0731;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 p-6 flex flex-col items-center justify-center min-h-screen">

    <div class="max-w-md w-full bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
        <h1 class="text-xl font-bold text-center mb-2">Dynamic Island iPhone 11</h1>
        <p class="text-xs text-slate-400 text-center mb-6">Menggunakan ralat ukuran kustom presisi.</p>

        <!-- Input File -->
        <div class="mb-4">
            <label class="block text-sm font-medium mb-2 text-slate-300">Upload Screenshot:</label>
            <input type="file" id="upload" accept="image/*" class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 cursor-pointer">
        </div>

        <!-- Preview Area dengan rasio presisi -->
        <div id="preview-container" class="relative hidden w-full overflow-hidden rounded-[38px] shadow-2xl border-[5px] border-slate-900 bg-black iphone-screen mb-4 flex justify-center mx-auto max-w-[260px]">
            <div id="capture-area" class="relative w-full h-full">
                <!-- Screenshot Result -->
                <img id="uploaded-image" class="w-full h-full object-cover" alt="Screenshot">
                
                <!-- 
                  Dynamic Island dikonversi proporsional dari ukuran:
                  - Lebar: 1.994 cm -> ~30.68%
                  - Tinggi: 0.6267 cm -> ~4.45%
                  - Jarak dari atas: 0.0747 cm -> ~0.53%
                -->
                <div class="absolute left-1/2 transform -translate-x-1/2 bg-black rounded-full shadow-md z-50"
                     style="top: 0.53%; width: 30.68%; height: 4.45%;"></div>
            </div>
        </div>

        <!-- Tombol Download -->
        <button id="download-btn" onclick="downloadImage()" class="hidden w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 px-4 rounded-xl transition duration-200 shadow-lg">
            Download High-Res
        </button>
    </div>

    <script>
        const uploadInput = document.getElementById('upload');
        const uploadedImage = document.getElementById('uploaded-image');
        const previewContainer = document.getElementById('preview-container');
        const downloadBtn = document.getElementById('download-btn');
        const captureArea = document.getElementById('capture-area');

        uploadInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImage.src = e.target.result;
                    previewContainer.classList.remove('hidden');
                    downloadBtn.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        function downloadImage() {
            // Menggunakan skala 3 agar hasil download tajam/high-res
            html2canvas(captureArea, { scale: 3, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'iphone-11-dynamic-island-precision.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
